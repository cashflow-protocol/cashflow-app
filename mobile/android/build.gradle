buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 34
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Prevent expo library from generating ExpoModulesPackageList (the app generates its own).
// Without this, R8 fails with "Type expo.modules.ExpoModulesPackageList is defined multiple times".
gradle.projectsEvaluated {
    def expoProject = project(':expo')
    // Disable the package list generation so the class isn't compiled into the library JAR
    expoProject.tasks.matching { it.name == 'generatePackagesList' }.configureEach {
        enabled = false
    }
}
