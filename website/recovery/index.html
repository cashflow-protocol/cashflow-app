<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow - Recovery Signing</title>
  <meta name="description" content="Sign a vault recovery proposal for Cashflow">
  <meta property="og:title" content="Cashflow - Recovery Signing">
  <meta property="og:description" content="Sign a vault recovery proposal">
  <meta property="og:image" content="https://cashflow.fun/assets/og-banner.png">
  <link rel="icon" type="image/png" href="/assets/logo-512.png">
  <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0b1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: #1a1528;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .info-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }
    .info-label { color: rgba(255,255,255,0.5); font-size: 14px; }
    .info-value { font-weight: 600; font-size: 14px; font-family: monospace; }
    .action-card {
      background: rgba(25,195,148,0.1);
      border: 1px solid rgba(25,195,148,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
    }
    .status {
      text-align: center;
      padding: 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.5);
    }
    .status.error { color: #ef4444; }
    .status.success { color: #19C394; font-weight: 600; }
    .signer-list { margin-bottom: 24px; }
    .signer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .signer-item:last-child { border-bottom: none; }
    .signer-addr { font-family: monospace; font-size: 13px; }
    .signer-type { font-size: 12px; color: rgba(255,255,255,0.4); }
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-signed { background: rgba(25,195,148,0.15); color: #19C394; }
    .badge-pending { background: rgba(255,200,50,0.12); color: #f5a623; }
    .badge-you { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .hidden { display: none !important; }

    /* Wallet picker modal */
    .wallet-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 100;
    }
    .wallet-sheet {
      width: 100%;
      max-width: 480px;
      background: #1a1528;
      border-radius: 24px 24px 0 0;
      padding: 20px 24px 40px;
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .wallet-sheet-handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      margin: 0 auto 20px;
    }
    .wallet-sheet-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .wallet-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wallet-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.15s;
    }
    .wallet-item:hover { background: rgba(255,255,255,0.1); }
    .wallet-item img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }
    .wallet-empty {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      padding: 24px 0;
    }
    .wallet-empty a {
      color: #a78bfa;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Cashflow</div>
    <div class="subtitle">Vault Recovery - External Wallet Signing</div>

    <div id="loading" class="status">Loading proposal...</div>

    <div id="content" class="hidden">
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">Vault</span>
          <span class="info-value" id="vault-addr"></span>
        </div>
        <div class="info-row">
          <span class="info-label">Threshold</span>
          <span class="info-value" id="threshold-info"></span>
        </div>
      </div>

      <h3 class="section-title">Actions</h3>
      <div id="actions"></div>

      <h3 class="section-title" style="margin-top:20px;">Signers</h3>
      <div id="signers" class="signer-list"></div>

      <div id="connect-section">
        <button class="btn btn-primary" id="connect-btn" onclick="showWalletPicker()">Connect Wallet</button>
      </div>

      <div id="sign-section" class="hidden">
        <button class="btn btn-primary" id="sign-btn" onclick="signTransaction()">Sign Recovery Proposal</button>
      </div>

      <div id="done-section" class="hidden">
        <div class="status success">Signed successfully! You can close this page.</div>
      </div>

      <div id="error-msg" class="status error hidden"></div>
    </div>

    <div id="not-found" class="hidden">
      <div class="status error">Proposal not found or has expired.</div>
    </div>
  </div>

  <!-- Wallet picker modal -->
  <div id="wallet-modal" class="wallet-overlay hidden" onclick="if(event.target===this)hideWalletPicker()">
    <div class="wallet-sheet">
      <div class="wallet-sheet-handle"></div>
      <div class="wallet-sheet-title">Connect Wallet</div>
      <div id="wallet-list" class="wallet-list"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname.includes('localhost')
      ? 'http://localhost:3000'
      : window.location.hostname.includes('dev.')
        ? 'https://api-dev.cashflow.fun'
        : 'https://api.cashflow.fun';

    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const proposalId = pathParts[pathParts.length - 1];

    let proposal = null;
    let connectedWallet = null;
    let selectedWalletAdapter = null;
    const detectedWallets = [];

    function truncate(addr) {
      return addr ? addr.slice(0, 4) + '...' + addr.slice(-4) : '';
    }

    function maskEmail(email) {
      if (!email) return '';
      if (email.length <= 12) return email.slice(0, 2) + '...' + email.slice(-4);
      return email.slice(0, 2) + '...' + email.slice(-10);
    }

    // ─── Wallet Standard detection ───
    // Detects all wallets that implement the Wallet Standard protocol,
    // plus legacy window-injected wallets (Phantom, Solflare, Backpack, etc.)

    function registerWallet(wallet) {
      // Avoid duplicates by name
      if (detectedWallets.some(w => w.name === wallet.name)) return;
      detectedWallets.push(wallet);
    }

    function detectWalletStandard() {
      // The Wallet Standard uses navigator.wallets as a registration point
      // Wallets call navigator.wallets.push({ register }) and apps respond
      try {
        const callbacks = [];
        const register = (...wallets) => {
          for (const w of wallets) {
            // Wallet Standard wallets have features map
            if (w.features && w.features['standard:connect']) {
              registerWallet({
                name: w.name,
                icon: w.icon,
                type: 'standard',
                adapter: w,
              });
            }
          }
        };

        // Process wallets already registered
        if (window.navigator.wallets) {
          const existing = window.navigator.wallets;
          if (Array.isArray(existing)) {
            // Process existing entries and replace with our hook
            for (const entry of existing) {
              if (typeof entry === 'function') {
                entry({ register });
              } else if (entry?.register) {
                // Already a registration API
              }
            }
            // Replace array with proxy to catch future registrations
            window.navigator.wallets = {
              push: (...args) => {
                for (const arg of args) {
                  if (typeof arg === 'function') {
                    arg({ register });
                  }
                }
              }
            };
          } else if (typeof existing.push === 'function') {
            existing.push({ register });
          }
        } else {
          window.navigator.wallets = {
            push: (...args) => {
              for (const arg of args) {
                if (typeof arg === 'function') {
                  arg({ register });
                }
              }
            }
          };
        }
      } catch (e) {
        console.warn('Wallet Standard detection error:', e);
      }
    }

    function detectLegacyWallets() {
      // Fallback: detect wallets via their window-injected providers
      const legacyWallets = [
        { check: () => window.phantom?.solana, name: 'Phantom', icon: 'https://phantom.app/img/logo_small.png' },
        { check: () => window.solflare, name: 'Solflare', icon: 'https://solflare.com/favicon.ico' },
        { check: () => window.backpack, name: 'Backpack', icon: 'https://backpack.app/favicon.ico' },
        { check: () => window.coin98?.sol, name: 'Coin98', icon: 'https://coin98.com/favicon.ico' },
        { check: () => window.exodus?.solana, name: 'Exodus', icon: 'https://www.exodus.com/favicon.ico' },
      ];

      for (const w of legacyWallets) {
        try {
          const provider = w.check();
          if (provider) {
            registerWallet({
              name: w.name,
              icon: w.icon,
              type: 'legacy',
              adapter: provider,
            });
          }
        } catch {}
      }
    }

    async function connectStandardWallet(wallet) {
      const connectFeature = wallet.adapter.features['standard:connect'];
      const result = await connectFeature.connect();
      const account = result.accounts[0];
      if (!account) throw new Error('No account returned');
      // Account address is a Uint8Array, convert to base58
      const pubkey = new solanaWeb3.PublicKey(account.address);
      return {
        publicKey: pubkey,
        signTransaction: async (tx) => {
          const signFeature = wallet.adapter.features['solana:signTransaction'];
          if (!signFeature) throw new Error('Wallet does not support signTransaction');
          const serialized = tx.serialize();
          const [result] = await signFeature.signTransaction({ transaction: serialized, account });
          return solanaWeb3.VersionedTransaction.deserialize(result.signedTransaction);
        },
      };
    }

    async function connectLegacyWallet(wallet) {
      const resp = await wallet.adapter.connect();
      const pubkey = resp.publicKey;
      return {
        publicKey: pubkey,
        signTransaction: (tx) => wallet.adapter.signTransaction(tx),
      };
    }

    // ─── Wallet picker UI ───

    function showWalletPicker() {
      const listEl = document.getElementById('wallet-list');
      listEl.innerHTML = '';

      if (detectedWallets.length === 0) {
        listEl.innerHTML = `
          <div class="wallet-empty">
            No Solana wallets detected.<br><br>
            Install <a href="https://phantom.app" target="_blank">Phantom</a>,
            <a href="https://solflare.com" target="_blank">Solflare</a>, or any
            Solana wallet extension.
          </div>
        `;
      } else {
        for (const wallet of detectedWallets) {
          const btn = document.createElement('button');
          btn.className = 'wallet-item';
          // Wallet Standard icon can be a data URI or URL
          const iconSrc = wallet.type === 'standard' && wallet.adapter.icon
            ? wallet.adapter.icon
            : wallet.icon;
          btn.innerHTML = `
            <img src="${iconSrc}" alt="${wallet.name}" onerror="this.style.display='none'">
            <span>${wallet.name}</span>
          `;
          btn.onclick = () => selectWallet(wallet);
          listEl.appendChild(btn);
        }
      }

      document.getElementById('wallet-modal').classList.remove('hidden');
    }

    function hideWalletPicker() {
      document.getElementById('wallet-modal').classList.add('hidden');
    }

    async function selectWallet(wallet) {
      hideWalletPicker();
      try {
        let connected;
        if (wallet.type === 'standard') {
          connected = await connectStandardWallet(wallet);
        } else {
          connected = await connectLegacyWallet(wallet);
        }

        connectedWallet = connected.publicKey.toString();
        selectedWalletAdapter = connected;

        const requiredSigner = proposal.requiredSigners.find(s => s.address === connectedWallet);
        if (!requiredSigner) {
          showError(`Wallet ${truncate(connectedWallet)} is not a required signer for this proposal.`);
          return;
        }

        if (requiredSigner.signed) {
          showError('This wallet has already signed this proposal.');
          return;
        }

        document.getElementById('connect-section').classList.add('hidden');
        document.getElementById('sign-section').classList.remove('hidden');
        renderProposal();
      } catch (err) {
        showError('Failed to connect wallet: ' + (err.message || err));
      }
    }

    // ─── Proposal loading & rendering ───

    async function loadProposal() {
      try {
        const res = await fetch(`${API_BASE}/vault-recovery/v1/proposal/${proposalId}`);
        if (!res.ok) throw new Error('Not found');
        const json = await res.json();
        proposal = json.data;
        renderProposal();
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('not-found').classList.remove('hidden');
      }
    }

    function renderProposal() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      document.getElementById('vault-addr').textContent = truncate(proposal.vaultAddress);
      document.getElementById('threshold-info').textContent =
        `${proposal.signaturesCollected}/${proposal.threshold} signatures`;

      const actionsEl = document.getElementById('actions');
      actionsEl.innerHTML = '';
      (proposal.actions || []).forEach(a => {
        const div = document.createElement('div');
        div.className = 'action-card';
        div.textContent = `Add member: ${truncate(a.memberAddress)} (${a.permissions})`;
        actionsEl.appendChild(div);
      });

      const signersEl = document.getElementById('signers');
      signersEl.innerHTML = '';
      proposal.requiredSigners.forEach(s => {
        const div = document.createElement('div');
        div.className = 'signer-item';

        const isYou = connectedWallet && s.address === connectedWallet;
        let badge = '';
        if (s.signed) {
          badge = '<span class="badge badge-signed">Signed</span>';
        } else if (isYou) {
          badge = '<span class="badge badge-you">You</span>';
        } else {
          badge = '<span class="badge badge-pending">Pending</span>';
        }

        div.innerHTML = `
          <div>
            <div class="signer-addr">${truncate(s.address)}</div>
            <div class="signer-type">${s.type || ''}${s.email ? ' - ' + maskEmail(s.email) : s.label ? ' - ' + s.label : ''}</div>
          </div>
          ${badge}
        `;
        signersEl.appendChild(div);
      });
    }

    // ─── Transaction signing ───

    async function signTransaction() {
      const btn = document.getElementById('sign-btn');
      btn.disabled = true;
      btn.textContent = 'Signing...';

      try {
        const txBytes = Uint8Array.from(atob(proposal.tx1Base64), c => c.charCodeAt(0));
        const tx = solanaWeb3.VersionedTransaction.deserialize(txBytes);

        const signedTx = await selectedWalletAdapter.signTransaction(tx);

        const accountKeys = tx.message.staticAccountKeys;
        const walletPubkey = new solanaWeb3.PublicKey(connectedWallet);
        const walletIndex = accountKeys.findIndex(k => k.equals(walletPubkey));

        if (walletIndex === -1) {
          showError('Wallet not found in transaction signers');
          btn.disabled = false;
          btn.textContent = 'Sign Recovery Proposal';
          return;
        }

        const sigBytes = signedTx.signatures[walletIndex];
        const sigBase64 = btoa(String.fromCharCode(...sigBytes));

        const submitRes = await fetch(`${API_BASE}/vault-recovery/v1/proposal/${proposalId}/submit-signature`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: connectedWallet, signature: sigBase64 }),
        });

        if (!submitRes.ok) {
          const err = await submitRes.json();
          throw new Error(err.error || 'Failed to submit signature');
        }

        document.getElementById('sign-section').classList.add('hidden');
        document.getElementById('done-section').classList.remove('hidden');
        await loadProposal();
      } catch (err) {
        showError('Signing failed: ' + (err.message || err));
        btn.disabled = false;
        btn.textContent = 'Sign Recovery Proposal';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 8000);
    }

    // ─── Init ───
    detectWalletStandard();
    // Give wallet extensions time to inject their providers
    setTimeout(() => {
      detectLegacyWallets();
      loadProposal();
    }, 500);
  </script>
</body>
</html>
