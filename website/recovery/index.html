<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cashflow - Recovery Signing</title>
  <meta name="description" content="Sign a vault recovery proposal for Cashflow">
  <meta property="og:title" content="Cashflow - Recovery Signing">
  <meta property="og:description" content="Sign a vault recovery proposal">
  <meta property="og:image" content="https://cashflow.fun/assets/og-banner.png">
  <link rel="icon" type="image/png" href="/assets/logo-512.png">
  <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0b1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: #1a1528;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .info-card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }
    .info-label { color: rgba(255,255,255,0.5); font-size: 14px; }
    .info-value { font-weight: 600; font-size: 14px; font-family: monospace; }
    .action-card {
      background: rgba(25,195,148,0.1);
      border: 1px solid rgba(25,195,148,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 26px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
    }
    .btn-success { background: #19C394; color: #fff; }
    .status {
      text-align: center;
      padding: 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.5);
    }
    .status.error { color: #ef4444; }
    .status.success { color: #19C394; font-weight: 600; }
    .signer-list { margin-bottom: 24px; }
    .signer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .signer-item:last-child { border-bottom: none; }
    .signer-addr { font-family: monospace; font-size: 13px; }
    .signer-type { font-size: 12px; color: rgba(255,255,255,0.4); }
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-signed { background: rgba(25,195,148,0.15); color: #19C394; }
    .badge-pending { background: rgba(255,200,50,0.12); color: #f5a623; }
    .badge-you { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Cashflow</div>
    <div class="subtitle">Vault Recovery - External Wallet Signing</div>

    <div id="loading" class="status">Loading proposal...</div>

    <div id="content" class="hidden">
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">Vault</span>
          <span class="info-value" id="vault-addr"></span>
        </div>
        <div class="info-row">
          <span class="info-label">Threshold</span>
          <span class="info-value" id="threshold-info"></span>
        </div>
      </div>

      <h3 class="section-title">Actions</h3>
      <div id="actions"></div>

      <h3 class="section-title" style="margin-top:20px;">Signers</h3>
      <div id="signers" class="signer-list"></div>

      <div id="connect-section">
        <button class="btn btn-primary" id="connect-btn" onclick="connectWallet()">Connect Wallet</button>
      </div>

      <div id="sign-section" class="hidden">
        <button class="btn btn-primary" id="sign-btn" onclick="signTransaction()">Sign Recovery Proposal</button>
      </div>

      <div id="done-section" class="hidden">
        <div class="status success">Signed successfully! You can close this page.</div>
      </div>

      <div id="error-msg" class="status error hidden"></div>
    </div>

    <div id="not-found" class="hidden">
      <div class="status error">Proposal not found or has expired.</div>
    </div>
  </div>

  <script>
    // Determine API base from the website hostname
    const API_BASE = window.location.hostname.includes('localhost')
      ? 'http://localhost:3000'
      : window.location.hostname.includes('dev.')
        ? 'https://api-dev.cashflow.fun'
        : 'https://api.cashflow.fun';

    // Extract proposalId from path: /recovery/{proposalId}
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const proposalId = pathParts[pathParts.length - 1];

    let proposal = null;
    let connectedWallet = null;
    let provider = null;

    function truncate(addr) {
      return addr ? addr.slice(0, 4) + '...' + addr.slice(-4) : '';
    }

    function maskEmail(email) {
      if (!email) return '';
      if (email.length <= 12) return email.slice(0, 2) + '...' + email.slice(-4);
      return email.slice(0, 2) + '...' + email.slice(-10);
    }

    async function loadProposal() {
      try {
        const res = await fetch(`${API_BASE}/vault-recovery/v1/proposal/${proposalId}`);
        if (!res.ok) throw new Error('Not found');
        const json = await res.json();
        proposal = json.data;
        renderProposal();
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('not-found').classList.remove('hidden');
      }
    }

    function renderProposal() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      document.getElementById('vault-addr').textContent = truncate(proposal.vaultAddress);
      document.getElementById('threshold-info').textContent =
        `${proposal.signaturesCollected}/${proposal.threshold} signatures`;

      // Actions
      const actionsEl = document.getElementById('actions');
      actionsEl.innerHTML = '';
      (proposal.actions || []).forEach(a => {
        const div = document.createElement('div');
        div.className = 'action-card';
        div.textContent = `Add member: ${truncate(a.memberAddress)} (${a.permissions})`;
        actionsEl.appendChild(div);
      });

      // Signers
      const signersEl = document.getElementById('signers');
      signersEl.innerHTML = '';
      proposal.requiredSigners.forEach(s => {
        const div = document.createElement('div');
        div.className = 'signer-item';

        const isYou = connectedWallet && s.address === connectedWallet;
        let badge = '';
        if (s.signed) {
          badge = '<span class="badge badge-signed">Signed</span>';
        } else if (isYou) {
          badge = '<span class="badge badge-you">You</span>';
        } else {
          badge = '<span class="badge badge-pending">Pending</span>';
        }

        div.innerHTML = `
          <div>
            <div class="signer-addr">${truncate(s.address)}</div>
            <div class="signer-type">${s.type || ''}${s.email ? ' - ' + maskEmail(s.email) : s.label ? ' - ' + s.label : ''}</div>
          </div>
          ${badge}
        `;
        signersEl.appendChild(div);
      });
    }

    async function connectWallet() {
      try {
        if (window.phantom?.solana) {
          provider = window.phantom.solana;
        } else if (window.solflare) {
          provider = window.solflare;
        } else {
          showError('No Solana wallet found. Please install Phantom or Solflare.');
          return;
        }

        const resp = await provider.connect();
        connectedWallet = resp.publicKey.toString();

        const requiredSigner = proposal.requiredSigners.find(s => s.address === connectedWallet);
        if (!requiredSigner) {
          showError(`Wallet ${truncate(connectedWallet)} is not a required signer for this proposal.`);
          return;
        }

        if (requiredSigner.signed) {
          showError('This wallet has already signed this proposal.');
          return;
        }

        document.getElementById('connect-section').classList.add('hidden');
        document.getElementById('sign-section').classList.remove('hidden');
        renderProposal();
      } catch (err) {
        showError('Failed to connect wallet: ' + (err.message || err));
      }
    }

    async function signTransaction() {
      const btn = document.getElementById('sign-btn');
      btn.disabled = true;
      btn.textContent = 'Signing...';

      try {
        // Use TX1 from the proposal directly — no need for threshold to be met
        const txBytes = Uint8Array.from(atob(proposal.tx1Base64), c => c.charCodeAt(0));
        const tx = solanaWeb3.VersionedTransaction.deserialize(txBytes);

        const signedTx = await provider.signTransaction(tx);

        const accountKeys = tx.message.staticAccountKeys;
        const walletPubkey = new solanaWeb3.PublicKey(connectedWallet);
        const walletIndex = accountKeys.findIndex(k => k.equals(walletPubkey));

        if (walletIndex === -1) {
          showError('Wallet not found in transaction signers');
          btn.disabled = false;
          btn.textContent = 'Sign Recovery Proposal';
          return;
        }

        const sigBytes = signedTx.signatures[walletIndex];
        const sigBase64 = btoa(String.fromCharCode(...sigBytes));

        const submitRes = await fetch(`${API_BASE}/vault-recovery/v1/proposal/${proposalId}/submit-signature`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: connectedWallet, signature: sigBase64 }),
        });

        if (!submitRes.ok) {
          const err = await submitRes.json();
          throw new Error(err.error || 'Failed to submit signature');
        }

        document.getElementById('sign-section').classList.add('hidden');
        document.getElementById('done-section').classList.remove('hidden');
        await loadProposal();
      } catch (err) {
        showError('Signing failed: ' + (err.message || err));
        btn.disabled = false;
        btn.textContent = 'Sign Recovery Proposal';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 8000);
    }

    loadProposal();
  </script>
</body>
</html>
